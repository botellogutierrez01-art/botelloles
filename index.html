<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Your Name | Kirby Portfolio</title>
  <meta name="description" content="A cute and bubbly portfolio project.">

  <!-- Typography: Importing 'Nunito' for a soft, bubbly, cute aesthetic -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <header>
    <nav>
      <div class="logo">🌟 MyBrand</div>
      <ul class="nav-links">
        <li><a href="#about">About</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main Content Area -->
  <main>

    <!-- Hero Section -->
    <section id="hero" class="hero">
      <div class="hero-content">
        <h1>Hi, I'm <span class="highlight">Your Name</span>! <span class="wave">🌸</span></h1>
        <p>I build elegant, dynamic, and <span class="super-cute">super cute</span> web applications.</p>
        <a href="#projects" class="btn-primary">View My Work ✨</a>
      </div>

      <!-- Upload a picture of Kirby to your repository and name it 'kirby.png' -->
      <div class="hero-image">
        <!-- Floating Kirby -->
        <img src="kirby.png" alt="Cute Kirby!" class="floating-kirby">
        <!-- Cute decorative background star behind Kirby -->
        <div class="bg-star">⭐</div>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Your Name. Built with 💕 and CSS.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
